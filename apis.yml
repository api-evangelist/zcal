aid: zcal
url: https://raw.githubusercontent.com/api-evangelist/zcal/refs/heads/main/apis.yml
name: Zcal
kind: company
description: Zcal is a free scheduling platform for booking meetings via shareable
  scheduling links, meeting polls, and team pages (round-robin and collective). Zcal
  does not publish a general-purpose public REST API; programmatic integration is
  delivered through outbound webhooks (event.created, event.rescheduled, event.cancelled)
  and no-code connectors such as Zapier and Make, plus native integrations including
  Zoom, Stripe, Google Analytics, and Meta Pixel.
