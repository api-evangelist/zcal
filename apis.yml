apis:
- aid: zcal:scheduling-links
  name: Zcal Scheduling Links
  tags:
  - Scheduling
  - Booking
  - Links
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.zcal.co/
  properties:
  - url: https://help.zcal.co/
    type: Documentation
  - url: https://zcal.co/
    type: Website
  - url: openapi/zcal-openapi.yml
    type: OpenAPI
  description: Unlimited shareable scheduling links, meeting polls, and customizable
    booking pages let invitees self-serve a time. This is a product surface managed
    through the Zcal web application; there is no documented public REST API for
    creating or managing scheduling links programmatically.
- aid: zcal:bookings
  name: Zcal Bookings
  tags:
  - Bookings
  - Events
  - Attendees
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.zcal.co/
  properties:
  - url: https://help.zcal.co/
    type: Documentation
  - url: https://zcal.co/
    type: Website
  - url: openapi/zcal-openapi.yml
    type: OpenAPI
  description: Bookings (events) capture timing, hosts, attendees, location, and
    custom question responses. Booking data is surfaced to external systems through
    outbound webhooks rather than a queryable public REST API.
- aid: zcal:integrations-webhooks
  name: Zcal Integrations and Webhooks
  tags:
  - Webhooks
  - Integrations
  - Automation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.zcal.co/integrations/webhooks
  properties:
  - url: https://help.zcal.co/integrations/webhooks
    type: Documentation
  - url: https://help.zcal.co/integrations/webhooks/webhook-payload
    type: Documentation
  - url: openapi/zcal-openapi.yml
    type: OpenAPI
  description: Outbound webhooks POST a JSON payload to a subscriber URL when a
    booking is created, rescheduled, or cancelled. Payloads can be verified with
    an optional HMAC SHA-256 signature via the x-zcal-webhook-signature header.
    Connectors such as Zapier and Make, plus native Zoom, Stripe, Google Analytics,
    and Meta Pixel integrations, extend automation without a public REST API.
