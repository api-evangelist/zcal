  - plan
principles:
- name: Visibility
  description: Track active paid seats per plan and review the monthly Zcal invoice against headcount.
- name: Allocation
  description: Map seats to teams; tag which users genuinely need Pro/Business team features vs. Free.
- name: Optimization
  description: >-
    Right-size seats to actual users; choose annual billing for Pro to lower
    effective per-seat cost; move payment-collecting users to Pro to drop the
    3% Free-plan fee; reserve Business only where custom domains / unlimited
    teams are required.
- name: Accountability
  description: Assign a plan owner; review seat count and plan tier each billing cycle against budget.
