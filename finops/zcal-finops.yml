description: >-
  FinOps view of Zcal spend. Zcal is billed as a per-user SaaS subscription
  (Free, Pro, Business), not usage-metered API consumption — there is no
  public REST API and therefore no per-call or per-token billing. The main
  cost levers are: number of paid seats (Pro at $7/user/mo, Business at
  $12/user/mo), the monthly-vs-annual choice (annual Pro is roughly
  $72/user/yr), and payment processing — the Free plan adds a 3% Zcal fee on
  top of Stripe fees for paid bookings, which Pro removes. Webhooks (the only
  programmatic integration) carry no separate Zcal charge.
notes: >-
  Prices captured from public sources as of 2026-06-21 and not reconciled
  against an authenticated billing account. Verify at
  https://zcal.co/pricing.
